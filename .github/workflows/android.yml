name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Esto genera los archivos mínimos que Gradle necesita para no quejarse
    - name: Inject Minimal Android Project
      run: |
        mkdir -p app/src/main/java/com/lucier2366/changomangoapp
        mkdir -p app/src/main/res/layout
        
        # Creamos un manifest básico
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.lucier2366.changomangoapp">
            <application android:label="ChangoMango" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # El build.gradle del modulo app
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.lucier2366.changomangoapp'
            compileSdk 34
            defaultConfig {
                applicationId "com.lucier2366.changomangoapp"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.zxing:core:3.5.3'
        }
        EOF

        # El codigo Java nativo con tu FLAG_SECURE
        cat << 'EOF' > app/src/main/java/com/lucier2366/changomangoapp/MainActivity.java
        package com.lucier2366.changomangoapp;
        import android.os.Bundle;
        import android.view.WindowManager;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                // Por defecto activamos el FLAG_SECURE que querías probar
                getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);
                
                // Aquí podrías agregar botones, pero para asegurar que compile el APK de prueba:
                android.widget.TextView tv = new android.widget.TextView(this);
                tv.setText("App ChangoMango con FLAG_SECURE activa. Intenta tomar captura!");
                tv.setGravity(android.view.Gravity.CENTER);
                setContentView(tv);
            }
        }
        EOF

        # Configuración de Gradle wrapper
        gradle wrapper --gradle-version 8.0

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
